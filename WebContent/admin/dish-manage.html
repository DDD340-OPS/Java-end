<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品管理</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <script defer src="../js/common.js"></script>
    <script defer src="../js/admin.js"></script>
</head>
<body data-admin-page="manage">
    <header class="topbar">
        <a class="brand" href="dashboard.html"><img src="../images/logo.svg" alt="">后台管理</a>
        <nav class="nav">
            <a href="dashboard.html">数据统计</a>
            <a href="pending-dish.html">菜品审核</a>
            <a href="dish-manage.html">菜品管理</a>
            <button type="button" data-logout>退出</button>
        </nav>
    </header>

    <main class="page">
        <section class="page-title">
            <h1>菜品管理</h1>
            <div class="field" style="min-width:180px;">
                <label for="statusFilter">状态</label>
                <select id="statusFilter">
                    <option value="-1">全部</option>
                    <option value="1">已通过</option>
                    <option value="2">已驳回</option>
                    <option value="3">已下架</option>
                    <option value="0">待审核</option>
                </select>
            </div>
        </section>
        <section class="admin-table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>图片</th>
                        <th>菜品</th>
                        <th>食堂</th>
                        <th>价格</th>
                        <th>推荐理由</th>
                        <th>上传者</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="manageTableBody"></tbody>
            </table>
        </section>
    </main>
</body>
</html>
