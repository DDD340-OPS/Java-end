<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传菜品</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/student.css">
    <script defer src="../js/common.js"></script>
    <script defer src="../js/upload-dish.js"></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="dish-list.html"><img src="../images/logo.svg" alt="">校园食堂评价与推荐系统</a>
        <nav class="nav">
            <a href="dish-list.html">菜品浏览</a>
            <a href="upload-dish.html">上传菜品</a>
            <a href="my-upload.html">我的上传</a>
            <a href="my-favorite.html">我的收藏</a>
            <button type="button" data-logout>退出</button>
        </nav>
    </header>

    <main class="page">
        <section class="page-title">
            <div>
                <h1>上传菜品</h1>
                <p>提交后进入待审核状态</p>
            </div>
        </section>

        <section class="panel">
            <form id="uploadDishForm" class="form-grid two" enctype="multipart/form-data">
                <input type="hidden" name="id" value="">
                <div class="field">
                    <label for="name">菜品名称</label>
                    <input id="name" name="name" required>
                </div>
                <div class="field">
                    <label for="canteen">所属食堂</label>
                    <select id="canteen" name="canteen" required>
                        <option value="">请选择食堂</option>
                        <option value="养贤府">养贤府</option>
                        <option value="家和堂">家和堂</option>
                        <option value="民族餐厅">民族餐厅</option>
                    </select>
                </div>
                <div class="field">
                    <label for="price">菜品价格</label>
                    <input id="price" name="price" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="field">
                    <label for="tags">口味标签</label>
                    <input id="tags" name="tags" placeholder="例如 麻辣,实惠,分量足">
                </div>
                <div class="field full">
                    <label for="reason">推荐理由</label>
                    <textarea id="reason" name="reason" maxlength="500"></textarea>
                </div>
                <div class="field">
                    <label for="image">菜品图片</label>
                    <input id="image" name="image" type="file" accept="image/*">
                </div>
                <div class="field">
                    <label>图片预览</label>
                    <img id="imagePreview" class="upload-preview" src="../images/default-dish.svg" alt="">
                </div>
                <div class="field full">
                    <div class="actions">
                        <button class="btn primary" type="submit">提交审核</button>
                        <a class="btn" href="my-upload.html">我的上传</a>
                    </div>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
